name: DeepTech Scanner Bot

on:
  # X API 사용량 소진으로 자동 스케줄 비활성화. 재개 시 아래 schedule 블록 주석 해제.
  # schedule:
  #   # 매일 UTC 기준 13:00 (EST 8:00 AM), 22:00 (EST 5:00 PM) 에 실행
  #   - cron: '0 13,22 * * *'
  workflow_dispatch: # GitHub 웹에서 언제든지 수동으로 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: posted_urls.txt 캐시 복원
        uses: actions/cache@v4
        with:
          path: data/posted_urls.txt
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: data 디렉토리 생성
        run: mkdir -p data assets logs

      - name: 메인 스크립트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python src/main.py

      - name: posted_urls.txt 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/posted_urls.txt
          key: posted-urls-${{ github.run_id }}
